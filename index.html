<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covoit'ebull</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-8">

    <header class="max-w-3xl mx-auto flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-8 border border-gray-200">
        <h1 class="text-2xl font-black text-black tracking-tight">Covoit'ebull</h1>
        
        <div id="auth-section">
            <button id="loginBtn" onclick="loginGoogle()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
                Connexion Google
            </button>
            <div id="userInfo" class="hidden flex items-center gap-4">
                <span id="userName" class="text-sm font-medium"></span>
                <button onclick="logoutGoogle()" class="text-xs text-red-500 underline">Déconnexion</button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto grid md:grid-cols-2 gap-8">
        
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Proposer un trajet</h2>
            <form id="tripForm" class="flex flex-col gap-3">
                
                <div>
                    <label class="text-xs font-bold text-gray-500">Lieu de départ</label>
                    <input type="text" id="start" placeholder="Ex: Fribourg" class="w-full p-2 border rounded bg-gray-50" required>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500">Lieu d'arrivée</label>
                    <input type="text" id="end" placeholder="Ex: Ebullition" class="w-full p-2 border rounded bg-gray-50" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-500">Heure de départ</label>
                        <input type="time" id="time" class="w-full p-2 border rounded bg-gray-50" required>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Date de départ</label>
                        <input type="date" id="date" class="w-full p-2 border rounded bg-gray-50" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-500">Places dispo</label>
                        <input type="number" id="seats" placeholder="Ex: 3" min="1" class="w-full p-2 border rounded bg-gray-50" required>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Temps sur place</label>
                        <input type="text" id="duration" placeholder="Ex: 4h" class="w-full p-2 border rounded bg-gray-50" required>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500">Ton Nom / Prénom</label>
                    <input type="text" id="driver" placeholder="Qui conduit ?" class="w-full p-2 border rounded bg-gray-50" required>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500">Ton Contact</label>
                    <input type="text" id="contact" placeholder="Tél ou Insta" class="w-full p-2 border rounded bg-gray-50" required>
                </div>

                <button type="submit" class="mt-4 bg-black text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition">
                    Valider le trajet
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4">Trajets disponibles</h2>
            <div id="tripList" class="flex flex-col gap-3">
                <p class="text-sm text-gray-400 italic">Aucun trajet proposé pour le moment.</p>
            </div>
        </section>

    </main>

        }

        function logoutGoogle() {
            auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('driver').value = user.displayName;

                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('driver').value = "";

            }

                            <div>
                                <p class="font-bold text-lg">${trip.start} ➔ ${trip.end}</p>
                                <p class="text-sm text-gray-600">Le ${trip.date} à ${trip.time}</p>
                                <p class="text-xs text-gray-500 mt-1">Temps sur place : ${trip.duration}</p>

            <i class="fas fa-car text-blue-500"></i> Trajets disponibles
        </h2>
        <div id="tripList" class="space-y-4">
            <p class="text-center text-gray-400 italic py-8">Chargement des trajets...</p>
        </div>
    </main>

    <script>
        // 1. TES CLES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDg75it5fG63xKOIeLe06xZ8ConR13KufI",
            authDomain: "covoit-ebull.firebaseapp.com",

        firebase.initializeApp(firebaseConfig);

                createdAt: firebase.firestore.FieldValue.serverTimestamp() // Heure exacte pour les trier
