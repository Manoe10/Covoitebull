<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covoit'ebull - Covoiturage Associatif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-blue-50 font-sans pb-10">

    <header class="bg-white shadow-md p-4 mb-6 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://storage.googleapis.com/gweb-uniblog-publish-prod/original_images/Ebull_Saison35_Logo_35_Full.png" alt="Logo Covoit'ebull" class="w-16 h-12 object-contain bg-white rounded border border-blue-200 p-1">
                <h1 class="text-xl font-bold text-blue-800">Covoit'ebull</h1>
            </div>
            
            <div>
                <button id="loginBtn" onclick="loginGoogle()" class="flex items-center gap-2 bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
                    <span class="hidden md:inline">Connexion</span>
                </button>
                <div id="userInfo" class="hidden flex-col items-end">
                    <p id="userName" class="text-sm font-bold text-blue-800"></p>
                    <button onclick="logoutGoogle()" class="text-xs text-gray-500 underline hover:text-red-500">Déconnexion</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4">
        
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-blue-500"></i> Proposer un trajet
            </h2>
            <form id="tripForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="driver" placeholder="Ton nom / pseudo" class="p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                <input type="text" id="contact" placeholder="Tél ou Insta" class="p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                
                <div class="md:col-span-2 grid grid-cols-2 gap-2">
                    <input type="text" id="start" placeholder="Départ (ex: Bulle Centre)" class="p-2 border rounded-lg" required>
                    <input type="text" id="end" placeholder="Arrivée (ex: Soirée Asso)" class="p-2 border rounded-lg" required>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" class="p-2 border rounded-lg" required>
                    <input type="time" id="time" class="p-2 border rounded-lg" required>
                </div>
                
                <input type="text" id="duration" placeholder="Temps sur place (ex: 3h)" class="p-2 border rounded-lg">
                <input type="number" id="seats" placeholder="Nombre de places" class="p-2 border rounded-lg" min="1" required>

                <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition">
                    Publier l'annonce
                </button>
            </form>
        </section>

        <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fas fa-car text-blue-500"></i> Trajets disponibles
        </h2>
        <div id="tripList" class="space-y-4">
            <p class="text-center text-gray-400 italic py-8">Chargement des trajets...</p>
        </div>
    </main>

    <script>
        // 1. TES CLES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDg75it5fG63xKOIeLe06xZ8ConR13KufI",
            authDomain: "covoit-ebull.firebaseapp.com",
            projectId: "covoit-ebull",
            storageBucket: "covoit-ebull.firebasestorage.app",
            messagingSenderId: "975429396685",
            appId: "1:975429396685:web:b9b4ace0e51d1fc4fd2184",
            measurementId: "G-02J6VR7XB3"
        };

        // 2. INITIALISATION
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentUser = null;

        // 3. GESTION DES COMPTES GOOGLE (Optionnel)
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Erreur de connexion : " + err.message));
        }

        function logoutGoogle() {
            auth.signOut();
        }

        // Écouter si quelqu'un se connecte ou se déconnecte
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            
            if (user) {
                // Connecté
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                // Pré-remplir le nom dans le formulaire
                document.getElementById('driver').value = user.displayName;
            } else {
                // Déconnecté
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                document.getElementById('driver').value = "";
            }
        });

        // 4. PUBLIER UN TRAJET
        const tripForm = document.getElementById('tripForm');
        tripForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche la page de se recharger
            
            // On prépare les données
            const nouveauTrajet = {
                driver: document.getElementById('driver').value,
                contact: document.getElementById('contact').value,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                duration: document.getElementById('duration').value || "Non précisé",
                seats: document.getElementById('seats').value,
                userId: currentUser ? currentUser.uid : "anonyme", // Pour savoir si on peut le supprimer
                createdAt: firebase.firestore.FieldValue.serverTimestamp() // Heure exacte pour les trier
            };

            try {
                // On envoie à ta base de données Firebase
                await db.collection('trajets').add(nouveauTrajet);
                tripForm.reset();
                if(currentUser) document.getElementById('driver').value = currentUser.displayName;
            } catch (error) {
                console.error(error);
                alert("Erreur lors de la publication. Vérifie les règles de ta base de données Firebase !");
            }
        });

        // 5. AFFICHER LES TRAJETS EN DIRECT
        const tripList = document.getElementById('tripList');
        
        db.collection('trajets').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
            tripList.innerHTML = ''; // On vide la liste
            
            if(snapshot.empty) {
                tripList.innerHTML = '<p class="text-center text-gray-400 italic py-8">Aucun trajet pour le moment.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const trip = doc.data();
                const id = doc.id;
                
                // Vérifier si l'utilisateur actuel est le créateur du trajet pour afficher le bouton "Supprimer"
                const peutSupprimer = currentUser && currentUser.uid === trip.userId;
                
                // Nettoyer le contact pour les liens (enlever les espaces)
                const lienContact = trip.contact.includes('@') 
                    ? `mailto:${trip.contact}` 
                    : `https://wa.me/${trip.contact.replace(/\s/g, '')}`;

                tripList.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 relative">
                        ${peutSupprimer ? `<button onclick="supprimerTrajet('${id}')" class="absolute
