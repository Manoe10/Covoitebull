<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covoit'Bulle - Ebullition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .ebull-black { background-color: #000; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="ebull-black text-white p-4 shadow-2xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://storage.googleapis.com/gweb-uniblog-publish-prod/original_images/Ebull_Saison35_Logo_35_Full.png" alt="Ebullition" class="h-10 bg-white p-1 rounded">
                <h1 class="font-black uppercase tracking-tighter">Covoit'Bulle</h1>
            </div>
            <div id="auth-section">
                <button onclick="login()" id="login-btn" class="bg-white text-black px-4 py-2 rounded-full text-xs font-bold uppercase hover:bg-gray-200 transition">
                    <i class="fab fa-google mr-2"></i> Connexion
                </button>
                <div id="user-info" class="hidden flex items-center gap-2">
                    <img id="user-pic" src="" class="h-8 w-8 rounded-full border border-white">
                    <button onclick="logout()" class="text-[10px] underline uppercase opacity-70">Déconnexion</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 mt-6">
        <section class="bg-white rounded-3xl p-6 border-2 border-black card-shadow mb-10">
            <h2 class="font-black uppercase mb-4 text-xl italic"><i class="fas fa-plus-circle mr-2"></i> Proposer un trajet</h2>
            <form id="add-trip-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="start" placeholder="Départ (ex: Bulle Gare)" class="p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-black" required>
                    <input type="text" id="end" placeholder="Arrivée (ex: Ebullition)" class="p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-black" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="date" class="p-3 bg-gray-100                    <input type="text" id="end" placeholder="Arrivée (ex: Soirée Asso)" class="p-2 border rounded-lg" required>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" class="p-2 border rounded-lg" required>
                    <input type="time" id="time" class="p-2 border rounded-lg" required>
                </div>
                
                <input type="text" id="duration" placeholder="Temps sur place (ex: 3h)" class="p-2 border rounded-lg">
                <input type="number" id="seats" placeholder="Nombre de places" class="p-2 border rounded-lg" min="1" required>

                <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition">
                    Publier l'annonce
                </button>
            </form>
        </section>

        <h2 class="text-lg font-bold text-gray-800 mb-4">Trajets disponibles</h2>
        <div id="tripList" class="space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs uppercase font-bold text-gray-400">Proposé par <span class="text-blue-600">Marc</span></p>
                        <h3 class="text-lg font-bold text-gray-800 mt-1">Bulle ➔ Fribourg</h3>
                        <p class="text-sm text-gray-600"><i class="far fa-calendar-alt"></i> Samedi 25 oct. à 21:00</p>
                        <p class="text-sm text-gray-600"><i class="far fa-clock"></i> Reste sur place : environ 4h</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-bold">3 places</span>
                    </div>
                </div>
                <button class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-blue-100 transition">
                    Rejoindre ce trajet
                </button>
            </div>
        </div>
    </main>

    <script>
        // Logique de démonstration
        const tripForm = document.getElementById('tripForm');
        const tripList = document.getElementById('tripList');

        tripForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Annonce publiée ! (Note : Pour que ça s'enregistre pour tout le monde, il faut connecter une base de données Firebase)");
        });
    </script>
</body>
</html>
